<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User | HeuriGuard</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/heuriguard-logo.png') }}">
    <link href="{{ url_for('static', filename='css/style.css') }}"
          rel="stylesheet" type="text/css">
    <link rel="icon" type="image/png" href="static/img/heuriguard-logo1.png">      
</head>

<body>

{% include "header_user.html" %}

<div class="container">
    <div class="card">
        <h2>SMS, Email & URL Malicious-Content Detection</h2>

        <textarea id="message"
            placeholder="Enter SMS text, email content, or URL here"></textarea>

        <button class="zoom-button" onclick="predict()">Analyze Message</button>

        <div id="result"></div>
    </div>
</div>

<footer class="dynamic-footer">
    &copy; <span id="current-year"></span> MD JAVEED KHAN & TEAM. All rights reserved.
</footer>

<script>
function predict() {
    const msg = document.getElementById("message").value;

    if (!msg.trim()) {
        document.getElementById("result").innerText =
            "⚠️ Please enter a message or URL.";
        return;
    }

    document.getElementById("result").innerText = "🔍 Analyzing...";

    fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerText = data.result;
    })
    .catch(error => {
        document.getElementById("result").innerText =
            "❌ Error occurred during prediction.";
        console.error(error);
    });
}

document.getElementById("current-year").textContent =
    new Date().getFullYear();
</script>

</body>
</html>
